name: Backend CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - devops/render-setup
      - main
  pull_request:
    branches:
      - dev
      - main
      - devops/render-setup

jobs:
  ci:
    name: CI | Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --passWithNoTests

      - name: Build backend
        run: npm run build

      - name: CI summary
        if: always()
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`$GITHUB_REF_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$GITHUB_SHA\` |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: CD | Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Deploying commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF_NAME"
          curl -f -X POST "${{ secrets.URL_DEPLOY_HOOK }}"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$GITHUB_SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`$GITHUB_REF_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Render |" >> $GITHUB_STEP_SUMMARY

  smoke:
    name: Smoke | Production checks
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'

    steps:
      - name: Wait for deployed commit
        run: |
          echo "Waiting for Render to expose deployed commit..."
          echo "Expected commit: $GITHUB_SHA"

          for i in {1..60}; do
            RESPONSE=$(curl -s "${{ secrets.BACKEND_URL }}/api/health/version" || true)
            echo "Attempt $i: $RESPONSE"

            DEPLOYED_COMMIT=$(echo "$RESPONSE" | node -e "
              let input='';
              process.stdin.on('data', d => input += d);
              process.stdin.on('end', () => {
                try {
                  const parsed = JSON.parse(input);
                  console.log(parsed.data?.commit || parsed.commit || '');
                } catch {
                  console.log('');
                }
              });
            ")

            echo "Deployed commit: $DEPLOYED_COMMIT"

            if [ "$DEPLOYED_COMMIT" = "$GITHUB_SHA" ]; then
              echo "Expected commit is deployed"
              exit 0
            fi

            sleep 5
          done

          echo "Expected commit was not deployed in time"
          exit 1

      - name: Check app health
        run: |
          curl -f "${{ secrets.BACKEND_URL }}/health"

      - name: Check database health
        run: |
          curl -f "${{ secrets.BACKEND_URL }}/api/health/database"

      - name: Smoke summary
        if: always()
        run: |
          echo "## Smoke Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Expected commit | \`$GITHUB_SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend URL | \`${{ secrets.BACKEND_URL }}\` |" >> $GITHUB_STEP_SUMMARY