name: Backend CI/CD

on:
  push:
    branches:
      - devops/render-setup
      - main
  pull_request:
    branches:
      - main
      - devops/render-setup

jobs:
  ci:
    name: CI | Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm lint

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build backend
        run: npm start

  deploy:
    name: CD | Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Deploying commit: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF_NAME"
          curl -f -X POST "${{ secrets.URL_DEPLOY_HOOK }}"

  smoke:
    name: Smoke | Production checks
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'

    steps:
      - name: Wait for Render deploy
        run: sleep 180

      - name: Check app health
        run: |
          curl -f "${{ secrets.BACKEND_URL }}/health"

      - name: Check database health
        run: |
          curl -f "${{ secrets.BACKEND_URL }}/health/database"

      - name: Smoke summary
        if: always()
        run: |
          echo "## Smoke checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$GITHUB_SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`$GITHUB_REF_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY